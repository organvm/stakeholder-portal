name: Maintenance Cron

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check database availability
        id: db-check
        run: |
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::DATABASE_URL not configured — skipping maintenance cycle"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run maintenance cycle
        if: steps.db-check.outputs.skip != 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MAINTENANCE_CONNECTORS: ${{ vars.MAINTENANCE_CONNECTORS }}
          MAINTENANCE_SCORECARD_PATH: .codex/telemetry/maintenance-scorecards.ndjson
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
        run: |
          CONNECTORS="${MAINTENANCE_CONNECTORS:-docs}"
          npm run maintenance:run -- --incremental --connectors "$CONNECTORS"

      - name: Upload maintenance scorecard artifact
        if: steps.db-check.outputs.skip != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: maintenance-scorecards
          path: .codex/telemetry/maintenance-scorecards.ndjson
          if-no-files-found: warn
